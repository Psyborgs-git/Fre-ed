<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none" aria-label="Fre-ed logo">
  <!-- Hexagonal mark -->
  <polygon
    points="18,4 30,11 30,25 18,32 6,25 6,11"
    fill="none"
    stroke="#22d3ee"
    stroke-width="2"
  />
  <!-- Inner diamond accent -->
  <polygon
    points="18,10 24,18 18,26 12,18"
    fill="#22d3ee"
    opacity="0.3"
  />
  <line x1="18" y1="4" x2="18" y2="10" stroke="#22d3ee" stroke-width="1.5" />
  <line x1="30" y1="11" x2="24" y2="18" stroke="#22d3ee" stroke-width="1.5" />
  <line x1="30" y1="25" x2="24" y2="18" stroke="#a78bfa" stroke-width="1.5" />
  <line x1="18" y1="32" x2="18" y2="26" stroke="#a78bfa" stroke-width="1.5" />
  <line x1="6" y1="25" x2="12" y2="18" stroke="#a78bfa" stroke-width="1.5" />
  <line x1="6" y1="11" x2="12" y2="18" stroke="#22d3ee" stroke-width="1.5" />

  <!-- Wordmark -->
  <text
    x="42"
    y="26"
    font-family="'Space Grotesk', Inter, sans-serif"
    font-size="20"
    font-weight="700"
    fill="#f5f5f7"
  >Fre</text>
  <text
    x="78"
    y="26"
    font-family="'Space Grotesk', Inter, sans-serif"
    font-size="20"
    font-weight="700"
    fill="#26262f"
  >-</text>
  <text
    x="88"
    y="26"
    font-family="'Space Grotesk', Inter, sans-serif"
    font-size="20"
    font-weight="700"
    fill="#f5f5f7"
  >ed</text>
</svg>
